repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
        exclude: ^(src/|lgpio\.i|lgpio_extra\.py)
      - id: trailing-whitespace
        exclude: ^(src/|lgpio\.i|lgpio_extra\.py)
  - repo: https://github.com/fsfe/reuse-tool
    rev: v6.2.0
    hooks:
      - id: reuse
